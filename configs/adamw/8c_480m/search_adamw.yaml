# =============================================================================
# AdamW 优化器 BCD 搜索配置
# =============================================================================
# 用法: python bcd_search.py --config configs/search_adamw.yaml

optimizer: adamw

# 基础参数
base_args:
  model: 480m
  seed: 42
  sequence_length: 2048
  device_batch_size: 4
  chinchilla_multiplier: 8.0
  val_loss_every: 125

# 各超参数的初始默认值
defaults:
  lr: 0.003
  beta1: 0.95
  beta2: 0.95
  eps: 1.0e-8
  weight_decay: 0.1
  grad_clip: 2.0
  batch_size: 256
  warmup_fraction: 0.05
  wsd_fraction: 1.0

# 各超参数的搜索 grid
hyperparams:
  lr: [0.0005, 0.001, 0.003, 0.005,0.008]
  beta1: [0.9, 0.95, 0.98]
  weight_decay: [0.1, 0.0, 0.2]

# BCD 搜索顺序
bcd_order:
  - lr
  - weight_decay
  - beta1

# 搜索控制
max_rounds: 20
convergence_threshold: 0.003
launcher: multi   # single=单机16卡, multi=多机
nproc: 16
output_dir: /models/share/chenyupeng/chenyupeng/pretraining_record/BCD_optimizer/adamw/8c480m
